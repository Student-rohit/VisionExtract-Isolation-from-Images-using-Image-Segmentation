<!DOCTYPE html>
<html>

<head><meta charset="utf-8">
<title>VisionExtract AI</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
color:#dcdcdc;
margin-bottom:30px;
}

.upload-box{
background:white;
color:black;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.3);
}

button{
background:#007BFF;
border:none;
color:white;
padding:10px 25px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.images{
margin-top:40px;
display:flex;
justify-content:center;
gap:40px;
}

.image-box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0px 4px 12px rgba(0,0,0,0.3);
}

.image-box img{
width:300px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>VisionExtract AI</h1>
<p class="subtitle">Automatic Subject Isolation using Deep Learning</p>

<div class="upload-box">

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Upload Image</button>

</form>

</div>

{% if input_image %}

<div class="images">

<div class="image-box">
<h3>Input Image</h3>
<img src="{{input_image}}">
</div>

<div class="image-box">
<h3>Isolated Subject</h3>
<img src="{{output_image}}">
</div>

</div>

{% endif %}

</div>

</body>

</html>
